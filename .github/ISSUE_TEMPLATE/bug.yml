name: Bug
description: A defect against the standard or an accepted issue
title: "[BUG] "
labels: ["type: bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behaviour
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
    validations:
      required: true
  - type: textarea
    id: accessibility-impact
    attributes:
      label: Accessibility impact
  - type: dropdown
    id: regression
    attributes:
      label: Regression
      options:
        - "Yes"
        - "No"
        - "Unknown"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
